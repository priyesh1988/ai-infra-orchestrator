apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-infra-orchestrator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ai-infra-orchestrator.git
    targetRevision: main
    path: helm/ai-infra-orchestrator
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
